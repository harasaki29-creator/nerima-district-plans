name: Run scraper and extract

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run scraper
        run: |
          python scraper/get_pdf_links.py
      - name: Extract metadata
        run: |
          python extractor/extract_metadata.py
      - name: Run vectorize (may be heavy)
        run: |
          python vectorize/vectorize_from_image.py
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extracted-data
          path: |
            data/json
            data/images
            data/geojson
